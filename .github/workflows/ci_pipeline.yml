name: O1-CoreGD Framework CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate-architecture:
    name: Framework Check (${{ matrix.language }})
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false 
      matrix:
        language: [ 'csharp', 'cpp' ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Engine Tools (C++)
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Execute Core Validation
        run: |
          echo "Executing AAA framework tests for ${{ matrix.language }}..."
          chmod +x ./run_tests.sh
          ./run_tests.sh ${{ matrix.language }}